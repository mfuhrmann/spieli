server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver.
    # This prevents nginx from failing to start when "postgrest" is not yet
    # reachable (e.g. running the app container standalone).
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Proxy /api/ → PostgREST.
    # rewrite strips the /api prefix before proxying.
    # Using a variable for proxy_pass so nginx doesn't fail at startup
    # if the postgrest container isn't yet resolvable.
    location /api/ {
        set $postgrest_upstream http://postgrest:3000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $postgrest_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow cross-origin requests so the Spielplatzkarte Hub can query this instance.
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;

        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
    }

    # version.json is baked in at build time — no caching, allow cross-origin for Hub.
    location = /version.json {
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # config.js is written at container startup from env vars — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # All other static assets get long-term immutable caching (Vite hashes their filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unknown paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
