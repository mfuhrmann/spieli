name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CI: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Svelte app build (CI gate) ───────────────────────────────────────────────
  build-app:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

  # ── Docker image ─────────────────────────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build-app
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Svelte app — APP_MODE=standalone or hub
          - name: app
            image_suffix: ""
            context: .
            dockerfile: oci/app/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
          tags: |
            type=raw,value=rc,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, docker-importer]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_FOOTER: |

            ---

            ## Upgrading

            See [Standard update](https://mfuhrmann.github.io/spieli/ops/upgrade/#standard-update) for full instructions.

            | Label in release above | Action required |
            |---|---|
            | ⚠️ Database changes | Pull + restart + `docker compose --profile <mode> run --rm -e API_ONLY=1 importer` |
            | 🔴 Full re-import required | Pull + restart + full re-import (no `API_ONLY`) |
            | 🔧 Environment variables changed | Update `.env` first, then pull + restart |
            | 🔧 Compose file changed | Re-run `install.sh` or update `compose.yml` manually, then pull + restart |
            | *(no label)* | Pull + restart is sufficient |
        run: |
          sha256sum install.sh > install.sh.sha256
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes-file <(gh api "/repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="${{ github.ref_name }}" \
              --jq '.body' && printf '%s' "$RELEASE_FOOTER") \
            install.sh install.sh.sha256

  # ── Importer image (unchanged) ───────────────────────────────────────────────
  docker-importer:
    name: Docker (importer)
    runs-on: ubuntu-latest
    needs: build-app
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-importer
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-importer
          tags: |
            type=raw,value=rc,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ./importer
          push: true
          tags: ${{ steps.meta-importer.outputs.tags }}
          labels: ${{ steps.meta-importer.outputs.labels }}
          build-args: VERSION=${{ steps.meta-importer.outputs.version }}
